<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 980" font-family="'IBM Plex Sans','Segoe UI',Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1480" height="980" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="52" font-size="22" font-weight="700" fill="#161616">IBM Bob x ContextForge — the AI agent control plane</text>
  <text x="40" y="76" font-size="11.5" fill="#525252">Who's in charge of your agents? Every tool call and agent-to-agent call is governed at the gateway.</text>

  <!-- ============ LEFT: IBM Bob ============ -->
  <rect x="40" y="380" width="240" height="150" rx="10" fill="#0f62fe" stroke="#0043ce" stroke-width="1.5"/>
  <text x="160" y="424" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">IBM Bob</text>
  <text x="160" y="446" font-size="11.5" fill="#ffffff" text-anchor="middle" opacity="0.92">AI agent / MCP client</text>
  <text x="160" y="476" font-size="11.5" fill="#ffffff" text-anchor="middle" opacity="0.92">connects via mcpgateway.wrapper</text>
  <text x="160" y="492" font-size="11.5" fill="#ffffff" text-anchor="middle" opacity="0.92">(stdio &lt;-&gt; SSE)</text>
  <text x="160" y="508" font-size="11.5" fill="#ffffff" text-anchor="middle" opacity="0.92">+ Bearer JWT</text>

  <!-- Bob -> Gateway arrow -->
  <line x1="280" y1="455" x2="452" y2="455" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="366" y="445" font-size="11" fill="#525252" text-anchor="middle">MCP over SSE</text>
  <text x="366" y="473" font-size="11" fill="#525252" text-anchor="middle">/servers/&lt;UUID&gt;/sse</text>

  <!-- ============ CENTER: ContextForge Gateway (control plane) ============ -->
  <rect x="455" y="250" width="420" height="480" rx="10" fill="#161616" stroke="#000000" stroke-width="1.5"/>
  <text x="665" y="292" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">ContextForge Gateway :4444</text>
  <text x="665" y="313" font-size="11.5" fill="#ffffff" text-anchor="middle" opacity="0.78">THE CONTROL PLANE — Admin UI /admin</text>
  <text x="665" y="329" font-size="11.5" fill="#ffffff" text-anchor="middle" opacity="0.78">plugins: FinByteGuard + cpex PII filter</text>

  <!-- Enforcement boundary callout (inside gateway) -->
  <rect x="478" y="350" width="374" height="196" rx="10" fill="#fcf4d6" stroke="#f1c21b" stroke-width="1.5"/>
  <text x="665" y="374" font-size="13" font-weight="600" fill="#161616" text-anchor="middle">Enforcement boundary</text>
  <text x="665" y="391" font-size="11" fill="#525252" text-anchor="middle">applied at tool_pre_invoke / tool_post_invoke hooks</text>
  <text x="498" y="419" font-size="11.5" fill="#161616">1. OPA wire-amount policy (deny &gt; $10k, no approval)</text>
  <text x="498" y="445" font-size="11.5" fill="#161616">2. PII/PCI + secret redaction</text>
  <text x="498" y="471" font-size="11.5" fill="#161616">3. Prompt-injection neutralization</text>
  <text x="498" y="497" font-size="11.5" fill="#161616">4. RBAC least-privilege (curated virtual servers)</text>
  <text x="498" y="527" font-size="11" fill="#525252">pre: query OPA · post: deep-redact + neutralize</text>

  <!-- Virtual servers (inside gateway, bottom) -->
  <text x="665" y="578" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Curated VIRTUAL SERVERS (per persona)</text>

  <rect x="478" y="592" width="118" height="118" rx="10" fill="#ffffff" stroke="#4589ff" stroke-width="1.5"/>
  <text x="537" y="616" font-size="13" font-weight="600" fill="#161616" text-anchor="middle">FinOps</text>
  <text x="537" y="638" font-size="11" fill="#525252" text-anchor="middle">8 tools</text>
  <text x="537" y="654" font-size="11" fill="#525252" text-anchor="middle">NO wire</text>
  <text x="537" y="670" font-size="11" fill="#525252" text-anchor="middle">ANALYST</text>
  <text x="537" y="691" font-size="11" fill="#525252" text-anchor="middle">least-privilege</text>

  <rect x="606" y="592" width="118" height="118" rx="10" fill="#ffffff" stroke="#4589ff" stroke-width="1.5"/>
  <text x="665" y="616" font-size="13" font-weight="600" fill="#161616" text-anchor="middle">Treasury</text>
  <text x="665" y="638" font-size="11" fill="#525252" text-anchor="middle">3 tools</text>
  <text x="665" y="654" font-size="11" fill="#525252" text-anchor="middle">WIRE path</text>
  <text x="665" y="670" font-size="11" fill="#525252" text-anchor="middle">reimburse,</text>
  <text x="665" y="686" font-size="11" fill="#525252" text-anchor="middle">a2a_payments</text>

  <rect x="734" y="592" width="118" height="118" rx="10" fill="#ffffff" stroke="#4589ff" stroke-width="1.5"/>
  <text x="793" y="616" font-size="13" font-weight="600" fill="#161616" text-anchor="middle">Operator</text>
  <text x="793" y="638" font-size="11" fill="#525252" text-anchor="middle">4 tools</text>
  <text x="793" y="654" font-size="11" fill="#525252" text-anchor="middle">control-plane</text>
  <text x="793" y="670" font-size="11" fill="#525252" text-anchor="middle">OPERATOR</text>
  <text x="793" y="686" font-size="11" fill="#525252" text-anchor="middle">persona</text>

  <!-- ============ OPA policy node ============ -->
  <rect x="455" y="100" width="240" height="110" rx="10" fill="#fff1f1" stroke="#da1e28" stroke-width="1.5"/>
  <text x="575" y="138" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">OPA :8181</text>
  <text x="575" y="160" font-size="11.5" fill="#525252" text-anchor="middle">Open Policy Agent (Rego)</text>
  <text x="575" y="178" font-size="11.5" fill="#525252" text-anchor="middle">package mcpgateway</text>
  <text x="575" y="194" font-size="11.5" fill="#525252" text-anchor="middle">finops.rego — $10k wire cap</text>

  <!-- Gateway <-> OPA bidirectional -->
  <line x1="600" y1="250" x2="600" y2="212" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="555" y1="210" x2="555" y2="248" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="234" font-size="11" fill="#525252" text-anchor="middle">policy query / decision</text>

  <!-- ============ RIGHT: governed backends ============ -->

  <!-- MCP servers group -->
  <rect x="1020" y="100" width="420" height="430" rx="10" fill="#f4f8ff" stroke="#4589ff" stroke-width="1.5" opacity="0.55"/>
  <text x="1230" y="128" font-size="13" font-weight="600" fill="#161616" text-anchor="middle">MCP servers (Python / FastMCP)</text>

  <!-- expense-db -->
  <rect x="1042" y="146" width="180" height="78" rx="10" fill="#d0e2ff" stroke="#4589ff" stroke-width="1.5"/>
  <text x="1132" y="180" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">expense-db</text>
  <text x="1132" y="201" font-size="11.5" fill="#525252" text-anchor="middle">list / get / receipt :8000</text>

  <!-- erp-payments -->
  <rect x="1238" y="146" width="180" height="78" rx="10" fill="#d0e2ff" stroke="#4589ff" stroke-width="1.5"/>
  <text x="1328" y="180" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">erp-payments</text>
  <text x="1328" y="201" font-size="11.5" fill="#525252" text-anchor="middle">approve / reimburse / wire</text>

  <!-- policy-docs -->
  <rect x="1042" y="236" width="180" height="78" rx="10" fill="#d0e2ff" stroke="#4589ff" stroke-width="1.5"/>
  <text x="1132" y="270" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">policy-docs</text>
  <text x="1132" y="291" font-size="11.5" fill="#525252" text-anchor="middle">get_policy / wire_limit</text>

  <!-- notify -->
  <rect x="1238" y="236" width="180" height="78" rx="10" fill="#d0e2ff" stroke="#4589ff" stroke-width="1.5"/>
  <text x="1328" y="270" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">notify</text>
  <text x="1328" y="291" font-size="11.5" fill="#525252" text-anchor="middle">notify</text>

  <!-- controlplane -->
  <rect x="1042" y="326" width="180" height="78" rx="10" fill="#d0e2ff" stroke="#4589ff" stroke-width="1.5"/>
  <text x="1132" y="356" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">controlplane</text>
  <text x="1132" y="375" font-size="11.5" fill="#525252" text-anchor="middle">register / list / blocks /</text>
  <text x="1132" y="391" font-size="11.5" fill="#525252" text-anchor="middle">evaluate (operator tools)</text>

  <!-- fx-rates (unregistered) -->
  <rect x="1238" y="326" width="180" height="78" rx="10" fill="#d0e2ff" stroke="#4589ff" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="1328" y="356" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">fx-rates</text>
  <text x="1328" y="375" font-size="11.5" fill="#525252" text-anchor="middle">get_fx_rate / list_currencies</text>
  <text x="1328" y="391" font-size="11.5" fill="#525252" text-anchor="middle">unregistered — onboarded live</text>

  <!-- A2A agents group -->
  <rect x="1020" y="430" width="420" height="100" rx="10" fill="#eafff0" stroke="#24a148" stroke-width="1.5" opacity="0.55"/>
  <text x="1230" y="424" font-size="13" font-weight="600" fill="#161616" text-anchor="middle">A2A agents (cross-language)</text>

  <!-- auditor -->
  <rect x="1042" y="446" width="180" height="68" rx="10" fill="#a7f0ba" stroke="#24a148" stroke-width="1.5"/>
  <text x="1132" y="478" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">auditor :9001</text>
  <text x="1132" y="498" font-size="11.5" fill="#525252" text-anchor="middle">Python (a2a-sdk)</text>

  <!-- payments -->
  <rect x="1238" y="446" width="180" height="68" rx="10" fill="#a7f0ba" stroke="#24a148" stroke-width="1.5"/>
  <text x="1328" y="478" font-size="15" font-weight="600" fill="#161616" text-anchor="middle">payments :3000</text>
  <text x="1328" y="498" font-size="11.5" fill="#525252" text-anchor="middle">Rust (a2a-lf) /jsonrpc</text>

  <!-- ============ Gateway -> backends arrows ============ -->
  <!-- common origin near right edge of gateway -->
  <line x1="875" y1="370" x2="1042" y2="185" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="875" y1="380" x2="1238" y2="185" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="875" y1="400" x2="1042" y2="275" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="875" y1="420" x2="1238" y2="275" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="875" y1="440" x2="1042" y2="365" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="875" y1="470" x2="1042" y2="480" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="875" y1="490" x2="1238" y2="480" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- live onboarding arrow to fx-rates (dashed) -->
  <line x1="875" y1="455" x2="1238" y2="365" stroke="#525252" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

  <text x="958" y="372" font-size="11" fill="#525252" text-anchor="middle">governs every call</text>

  <!-- Footer note -->
  <text x="40" y="930" font-size="11.5" fill="#525252">Gateway is the single policy enforcement point: Bob never reaches a backend directly. Same wire cap blocks the cross-language Auditor -&gt; Payments $50k at the bridged a2a-payments hook.</text>
  <text x="40" y="950" font-size="11.5" fill="#525252">OPA (:8181) and MCP servers (:8000) are reachable only on the compose private network; only the gateway (:4444), auditor (:9001) and payments (:3000) publish to host.</text>
</svg>
